name: Build

on:
    push:
        branches: [main, master]
    pull_request:

permissions:
    contents: read

jobs:
    node:
        strategy:
            matrix:
                node: [22, 24]
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-go@v5
              with:
                  go-version: 1.25.12
                  cache: true
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node }}
                  cache: npm
            - run: npm ci
            - run: npm run build
            - run: npm run check
            - run: npm run pack:check

    browser:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-go@v5
              with:
                  go-version: 1.25.12
                  cache: true
            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: npm
            - run: npm ci
            - run: npx playwright install --with-deps chromium
            - run: npm run build
            - run: npm run test:browser
